services:
  db:
    image: pgvector/pgvector:0.8.2-pg18
    container_name: living_abroad_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - living_abroad_db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  ai-server:
    build: ./ai-server
    container_name: living_abroad_ai_server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_API_BASE_URL: ${LLM_API_BASE_URL}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME}
      HF_HUB_DISABLE_IMPLICIT_TOKEN: "1"
    expose:
      - "8000"

  backend:
    build: ./backend
    container_name: living_abroad_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      ai-server:
        condition: service_started
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: prod
      SPRING_FLYWAY_LOCATIONS: filesystem:/data/database
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-1209600000}
      AI_SERVER_INTERNAL_URL: http://ai-server:8000
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
      EMAIL_VERIFICATION_EXPIRATION_MS: ${EMAIL_VERIFICATION_EXPIRATION_MS:-86400000}
    volumes:
      - ./data/database:/data/database:ro
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
    container_name: living_abroad_frontend
    restart: unless-stopped
    expose:
      - "80"

  nginx:
    image: nginx:1.30-alpine
    container_name: living_abroad_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro

  # 인증서 발급/갱신 전용 — 기본 커맨드 없이 실행하면 바로 종료된다(정상).
  # 갱신할 땐 `docker compose run --rm certbot renew`로 수동/cron 실행한다.
  # (entrypoint를 따로 덮어쓰지 않는다 — 덮어쓰면 `docker compose run`의 인자까지
  # 같이 삼켜버려서 실제 certbot 명령이 전혀 실행되지 않는다.)
  certbot:
    image: certbot/certbot
    container_name: living_abroad_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt

volumes:
  living_abroad_db_data:
  certbot_www:
  certbot_conf:
