spring:
  application:
    name: living-abroad-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:living_abroad}
    username: ${DB_USER:living_abroad}
    password: ${DB_PASSWORD:}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: filesystem:../data/database
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:1209600000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  ai-server:
    base-url: ${AI_SERVER_INTERNAL_URL:http://localhost:8000}
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  email-verification:
    expiration-ms: ${EMAIL_VERIFICATION_EXPIRATION_MS:86400000}
  rate-limit:
    auth:
      limit: ${RATE_LIMIT_AUTH_LIMIT:5}
      window-ms: ${RATE_LIMIT_AUTH_WINDOW_MS:60000}
    general:
      limit: ${RATE_LIMIT_GENERAL_LIMIT:60}
      window-ms: ${RATE_LIMIT_GENERAL_WINDOW_MS:60000}
