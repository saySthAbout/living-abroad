server {
    listen 80;
    server_name _;
    client_max_body_size 5m;

    # Let's Encrypt HTTP-01 challenge (certbot webroot) — must stay reachable on
    # plain HTTP even after HTTPS is enabled below, for cert renewal.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;
    client_max_body_size 5m;

    ssl_certificate /etc/letsencrypt/live/34.132.107.128.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/34.132.107.128.sslip.io/privkey.pem;

    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # RunPod Serverless 콜드 스타트(워커 0개에서 기동)가 기본 60초보다 오래 걸릴 수 있어서
        # AI_SERVER_READ_TIMEOUT_MS(application.yml)보다 넉넉하게 늘려둔다.
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://frontend:80/;
        proxy_set_header Host $host;
    }
}
